name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: app_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://dev_user:dev_password@localhost:5432/app_test?schema=public
      JWT_SECRET: ci-test-secret-at-least-16-chars
      JWT_REFRESH_SECRET: ci-test-refresh-secret-16-chars
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: bunx prisma generate

      # Same gate the pre-push hook runs locally — one source of truth.
      - name: Format
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck

      - name: Apply migrations
        working-directory: apps/api
        run: bunx prisma migrate deploy

      - name: Test (with coverage floor)
        working-directory: apps/api
        run: bun test --coverage src
      - name: Web tests
        run: bun run test

      - name: Build
        run: bun run build

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint PR commits
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.sha }}
