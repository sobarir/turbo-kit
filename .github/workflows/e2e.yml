name: E2E

# End-to-end browser tests run as a SEPARATE job from the main CI gate — they're
# slower and need the full stack running, so they shouldn't block every fast check.
on:
  pull_request:
  workflow_dispatch: # allow manual runs

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: app_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://dev_user:dev_password@localhost:5432/app_e2e?schema=public
      JWT_SECRET: ci-e2e-secret-at-least-16-chars
      JWT_REFRESH_SECRET: ci-e2e-refresh-secret-16-chars
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      CI: 'true'
      E2E_BASE_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Prepare database
        working-directory: apps/api
        run: |
          bunx prisma generate
          bunx prisma migrate deploy
          bun run db:seed

      - name: Install Playwright browsers
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Start API
        working-directory: apps/api
        run: |
          bun run build
          (bun run start:prod &) # background
          npx wait-on http://localhost:3000/api/health -t 60000 || sleep 10

      - name: Start web
        working-directory: apps/web
        run: |
          bun run build
          (bun run start &) # background
          npx wait-on http://localhost:3001 -t 60000

      - name: Run E2E tests
        working-directory: apps/web
        run: bunx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
